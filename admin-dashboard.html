<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - SkyLanka Airways</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard">
<nav class="navbar">
    <a class="brand" href="admin-dashboard.html">SkyLanka Airways</a>
    <div class="nav-links">

</nav>
